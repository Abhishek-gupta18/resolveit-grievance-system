spring.application.name=ResolveIT-Grievance-System
server.port=8008

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/resolveit_auth?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Commando@1856
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.initialization-fail-timeout=-1

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Application logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG

# JWT Configuration
# Secret key (Base64 encoded) - 256-bit key for HS256 algorithm
jwt.secret=pdf/djcEVUzCZ+aStjg5qedJWI7E+ewn5+M1UaBO4LA=
# Token expiration time in milliseconds (1 hour = 3600000ms)
jwt.expiration=3600000

# File upload configuration for complaint proof documents
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Automatic complaint escalation configuration
app.escalation.unresolved-days=3
app.escalation.cron=0 0 1 * * *